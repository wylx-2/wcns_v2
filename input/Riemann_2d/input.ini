# ===========================================================================
# WCNS v2 — 2D Riemann Problem Configuration
# Lax & Liu (1998) Configuration 3: four-shock interaction
# ===========================================================================
# Domain: [0,1] × [0,1], split into 4 quadrants at (0.5, 0.5)
#
#         NW (ρ=1.5, u=0, v=0, p=1.5)    NE (ρ=0.5323, u=1.206, v=0, p=0.3)
#         SW (ρ=0.138, u=1.206, v=1.206,  SE (ρ=0.5323, u=0, v=1.206, p=0.3)
#                       p=0.029)
#
# Run: ./build/wcns_v2 input/Riemann_2d/riemann_2d_structured.cgns input/Riemann_2d/input.ini
# ===========================================================================

[physical]
gamma   = 1.4
prandtl = 0.72
re      = 1.0e6
mach    = 0.5
aoa     = 0.0
beta    = 0.0

[reference]
length      = 1.0
rho         = 1.225
temp        = 288.15
gas_constant = 287.0

[control]
cfl           = 0.3
fixed_dt      = 0.0
max_iter      = 5000
max_time      = 0.3
output_freq   = 200
restart_freq  = 1000
residual_freq = 1
converge_tol  = 1.0e-8
time_scheme   = rk3-tvd
ng            = 3

[scheme]
interp_vars     = conservative
interp_type     = weno_js
riemann_type    = roe
entropy_fix_eps = 0.1
viscous_type    = none

[initialization]
init_type       = riemann_2d
riemann_config  = 3
riemann_x_split = 0.5
riemann_y_split = 0.5

body_force_type = none
body_force_x = 0.0
body_force_y = 0.0
body_force_z = 0.0

# Use slip walls (inviscid) — actual BC type comes from CGNS grid patches
wall_type = slip

[output]
output_format = tecplot
output_dir    = input/Riemann_2d
