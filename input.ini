# ===========================================================================
# WCNS v2 — Solver Configuration
# Non-dimensional compressible Navier-Stokes on structured multi-block grids
# ===========================================================================

[physical]
# Specific heat ratio
gamma   = 1.4

# Prandtl number
prandtl = 0.72

# Reynolds number (Re = rho_ref * U_ref * L_ref / mu_ref)
re      = 1.0e6

# Free-stream Mach number
mach    = 0.5

# Angle of attack [degrees]
aoa     = 2.0

# Sideslip angle [degrees]
beta    = 0.0

[reference]
# Reference length (e.g. airfoil chord)
length      = 1.0

# Reference density (free-stream, dimensional)
rho         = 1.225

# Reference temperature (free-stream, dimensional)
temp        = 288.15

# Gas constant for air [J/(kg·K)]
gas_constant = 287.0

[control]
# CFL number
cfl         = 0.5

# Fixed time step (set > 0 to override CFL-based dt computation)
fixed_dt    = 0.0

# Maximum number of iterations
max_iter    = 1000

# Maximum physical time (0 = disabled, step-based only)
# max_time    = 10.0

# Output frequency (every N iterations)
output_freq = 100

# Restart file frequency (every N iterations)
restart_freq = 500

# Residual/monitor computation frequency (every N iterations)
residual_freq = 1

# Convergence tolerance (L2 residual norm)
converge_tol = 1.0e-6

# Time integration scheme: rk3-tvd, rk4, lu-sgs
time_scheme  = rk3-tvd

# Number of ghost cell layers (driven by scheme order: 3 for 5th/6th order WCNS)
ng           = 3

[scheme]
# Variable space for WCNS interpolation: conservative, characteristic
interp_vars = conservative

# WCNS interpolation scheme: weno_js, mdcd_linear, mdcd_hybrid
interp_type = weno_js

# MDCD interpolation parameters (used by mdcd_linear / mdcd_hybrid)
# mdcd_diss    = 0.0      # dissipation coefficient
# mdcd_disp    = 0.0      # dispersion coefficient
# mdcd_sai_ref = 0.4      # discontinuity detector threshold (mdcd_hybrid only)

# Riemann solver type: roe
# riemann_type    = roe
# entropy_fix_eps = 0.1   # Harten entropy fix coefficient (0 = no fix)

# Viscous model: none, constant, sutherland
viscous_type = constant

# Constant viscosity multiplier (viscous_type="constant" only, default=1.0)
# mu_const = 1.0

# Sutherland constant [K] (viscous_type="sutherland" only, 110.4K for air)
# sutherland_s = 110.4

[initialization]
# Initial condition type: uniform, poiseuille
init_type = uniform

# Body force (source term for momentum equations, e.g. pressure gradient)
# body_force_type: none (no source), constant (uniform acceleration vector)
body_force_type = none
body_force_x = 0.0
body_force_y = 0.0
body_force_z = 0.0

# Poiseuille flow parameters (used when init_type = poiseuille)
# poiseuille_umax  = 1.0    # centerline (max) velocity
# poiseuille_y_min = -1.0   # lower wall y-coordinate
# poiseuille_y_max = 1.0    # upper wall y-coordinate

# Wall boundary condition type: adiabatic_noslip, slip
wall_type = adiabatic_noslip

[output]
# Solution output format: tecplot (implemented), cgns (reserved), vtk (reserved)
output_format = tecplot

# Output directory ("" = current working directory)
output_dir =

# Physical time interval for solution output (0 = step-based only, reserved)
# output_time_interval = 0.0
